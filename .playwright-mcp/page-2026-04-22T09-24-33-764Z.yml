        - heading "Under the Hood" [level=3] [ref=e443]:
          - img [ref=e444]
          - text: Under the Hood
        - paragraph [ref=e446]: Traff✱k is the dashcam you never knew you needed for Tokai's morning rush.
      - generic [ref=e447]:
        - paragraph [ref=e448]: It models every car, every slow-down at a speed hump, and every frustrated parent trying to squeeze in a quick drop-off. The heart of the simulation is the Intelligent Driver Model — that decides how close cars follow each other, how fast they accelerate, and when they brake gently instead of slamming on the anchors.
        - paragraph [ref=e449]: The model uses a "main route" for each entry / exit corridor from Firgrove Way, Homestead Av, Children's Way and Main Rd. This is the route most cars will follow — until traffic starts to build up. Then cars will find and follow multiple rat-runs to the school. The model attempts to avoid the normal Sweet Valley routes at the top of Dreyersdal Rd and exiting via Homestead.
