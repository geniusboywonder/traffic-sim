          - heading "The Foundation — The Official TIA" [level=3] [ref=e623]
          - paragraph [ref=e624]:
            - text: The Traffic Impact Assessment (TIA) is the starting point — and the rulebook. Commissioned under Western Cape Mobility Department
            - link "(WCMD)" [ref=e625] [cursor=pointer]:
              - /url: https://www.westerncape.gov.za/mobility
            - text: "guidelines and following South Africa's TMH 16 standard, it sets the study area's trip counts, directional splits, and the 840-vehicle High scenario demand baseline. The TIA's method is analytical: standardised traffic engineering formulas applied to the worst-case 15-minute peak window. It's a snapshot, not a simulation — but that snapshot defines the problem."
      - generic [ref=e626]:
        - generic [ref=e627]: "2"
        - generic [ref=e628]:
          - heading "Our Live Simulation" [level=3] [ref=e629]
          - paragraph [ref=e630]: "The interactive engine running on your screen is calibrated directly to the TIA's figures — same trip volumes, same origin splits, same peak-hour demand curve peaking at 07:45. It then goes where the TIA cannot: every vehicle moves individually using the Intelligent Driver Model (IDM), the same car-following mathematics used by professional-grade simulators. Speed humps, junction holds, rat-run decisions, school dwell time — all modelled car by car, second by second."
      - generic [ref=e631]:
        - generic [ref=e632]: "3"
        - generic [ref=e633]:
          - heading "Lab — Professional Cross-Check" [level=3] [ref=e634]
          - paragraph [ref=e635]: Once we had a live model, we needed an independent referee. The Lab model runs on SUMO (Simulation of Urban MObility), developed by the German Aerospace Center (DLR) — one of the world's most widely used microscopic traffic simulators, trusted by governments, universities, and transport authorities globally. The Lab model's outputs closely match our Live engine across all three scenarios. That agreement is the institutional stamp on our custom model.
      - generic [ref=e636]:
        - generic [ref=e637]: "4"
        - generic [ref=e638]:
          - heading "Validation — Network-Level Confirmation" [level=3] [ref=e639]
          - paragraph [ref=e640]: "UXSim (developed by Dr. Toru Seo, Institute of Science Tokyo) operates at a different level — mesoscopic, modelling traffic as flow rather than individual cars. Its mathematics are kinematic wave theory: the same language the TIA uses for its capacity calculations. This is why UXSim is uniquely useful here: it doesn't replace the Lab model or our Live engine, it audits them from the network level."
      - generic [ref=e641]:
        - generic [ref=e642]: "5"
        - generic [ref=e643]:
          - heading "Reading the Instruments" [level=3] [ref=e644]
          - paragraph [ref=e645]: "Our Live engine and the Lab model are stochastic — each run includes realistic random variation in driver behaviour, so exact numbers shift slightly between runs. The TIA and UXSim use deterministic, averaged flows, so they always return the same result. Our Live engine also adds layers the others don't: dynamic egress holds at the Ladies Mile signal during peak, dwell time at the school, and real-time rat-run activation based on live congestion."
