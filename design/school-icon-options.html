<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Icon Animation Options</title>
<style>
  body { background: #050d1a; display: flex; gap: 3rem; padding: 4rem; align-items: center; justify-content: center; font-family: Manrope, sans-serif; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .label { color: rgba(241,245,241,0.6); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .name  { color: #A1CCA5; font-size: 1rem; font-weight: 800; }

  /* ── Shared SVG size ── */
  svg { width: 64px; height: 64px; }

  /* ── 1. Draw / trace ── */
  .draw path, .draw line {
    stroke: #A1CCA5;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: draw 2.5s ease-in-out infinite;
  }
  .draw path:nth-child(2) { animation-delay: 0.3s; }
  .draw path:nth-child(3) { animation-delay: 0.5s; }
  .draw path:nth-child(4) { animation-delay: 0.7s; }
  .draw path:nth-child(5) { animation-delay: 0.9s; }
  @keyframes draw {
    0%   { stroke-dashoffset: 200; opacity: 0.3; }
    40%  { stroke-dashoffset: 0;   opacity: 1; }
    70%  { stroke-dashoffset: 0;   opacity: 1; }
    100% { stroke-dashoffset: -200; opacity: 0.3; }
  }

  /* ── 2. Pulse glow ── */
  .pulse path, .pulse line {
    stroke: #A1CCA5;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { stroke: #2D5438; filter: drop-shadow(0 0 2px #2D5438); }
    50%       { stroke: #A1CCA5; filter: drop-shadow(0 0 8px #A1CCA5) drop-shadow(0 0 16px #709775); }
  }

  /* ── 3. Colour cycle ── */
  .cycle path, .cycle line {
    animation: colour-cycle 4s linear infinite;
  }
  @keyframes colour-cycle {
    0%   { stroke: #2D5438; }
    25%  { stroke: #709775; }
    50%  { stroke: #A1CCA5; }
    75%  { stroke: #709775; }
    100% { stroke: #2D5438; }
  }

  /* ── 4. Drop shadow pulse ── */
  .shadow-pulse {
    animation: shadow-pulse 2s ease-in-out infinite;
  }
  .shadow-pulse path, .shadow-pulse line { stroke: #A1CCA5; }
  @keyframes shadow-pulse {
    0%, 100% { filter: drop-shadow(0 0 2px rgba(161,204,165,0.3)); }
    50%       { filter: drop-shadow(0 0 12px rgba(161,204,165,0.9)) drop-shadow(0 0 24px rgba(112,151,117,0.5)); }
  }
</style>
</head>
<body>

<!-- Shared SVG paths as a template -->
<template id="icon-paths">
  <path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/>
  <path d="M6 18h1"/><path d="M17 18h1"/>
  <path d="M12 2v6"/><path d="M6 10v8"/><path d="M18 10v8"/>
  <path d="M6 14h12"/>
</template>

<div class="option">
  <div class="name">Option 1</div>
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="draw">
    <path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/>
    <path d="M6 18h1"/><path d="M17 18h1"/>
    <path d="M12 2v6"/><path d="M6 10v8"/><path d="M18 10v8"/>
    <path d="M6 14h12"/>
  </svg>
  <div class="label">Draw / Trace</div>
</div>

<div class="option">
  <div class="name">Option 2</div>
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="pulse">
    <path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/>
    <path d="M6 18h1"/><path d="M17 18h1"/>
    <path d="M12 2v6"/><path d="M6 10v8"/><path d="M18 10v8"/>
    <path d="M6 14h12"/>
  </svg>
  <div class="label">Pulse Glow</div>
</div>

<div class="option">
  <div class="name">Option 3</div>
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="cycle">
    <path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/>
    <path d="M6 18h1"/><path d="M17 18h1"/>
    <path d="M12 2v6"/><path d="M6 10v8"/><path d="M18 10v8"/>
    <path d="M6 14h12"/>
  </svg>
  <div class="label">Colour Cycle</div>
</div>

<div class="option">
  <div class="name">Option 4</div>
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shadow-pulse">
    <path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/>
    <path d="M6 18h1"/><path d="M17 18h1"/>
    <path d="M12 2v6"/><path d="M6 10v8"/><path d="M18 10v8"/>
    <path d="M6 14h12"/>
  </svg>
  <div class="label">Drop Shadow Pulse</div>
</div>

</body>
</html>
